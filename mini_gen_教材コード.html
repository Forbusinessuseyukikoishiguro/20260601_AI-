<!DOCTYPE html>
<!-- =========================================================
  📚 勉強会 教材：最小版ジェネレーター（mini-gen）
  「入力 → 生成 → 出力」の3部だけに絞った学習用の単一HTML。
  実物（教育設計ジェネレーター）の“縮図”です。
  ※このファイル単体で動きます（ダブルクリックで開くだけ）。
============================================================ -->
<html lang="ja">
<head>
<meta charset="UTF-8">                              <!-- 文字コードはUTF-8（日本語の文字化け防止） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホでも崩れない -->
<title>mini-gen 最小ジェネレーター</title>
<style>
  /* 見た目（CSS）。学習のため最小限だけ。 */
  body{font-family:sans-serif;max-width:680px;margin:24px auto;padding:0 16px;line-height:1.7;color:#222}
  label{display:block;font-weight:bold;margin:10px 0 4px}
  input,textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px;font:inherit}
  button{margin-top:12px;padding:10px 18px;border:0;border-radius:8px;background:#2b6;color:#fff;font-weight:bold;cursor:pointer}
  #out{white-space:pre-wrap;border:1px solid #ddd;border-radius:8px;padding:12px;margin-top:16px;background:#fafafa}
  .badge{position:fixed;right:10px;bottom:10px;background:#eee;border-radius:999px;padding:4px 10px;font-size:12px}
</style>
</head>
<body>
  <h1>🐰 mini-gen（最小ジェネレーター）</h1>

  <!-- ① 入力（INPUT）：ユーザーが値を入れるところ -->
  <label>コース名（必須）</label>
  <input id="course" placeholder="例）はじめてのLinux">
  <label>対象（任意）</label>
  <input id="audience" placeholder="例）文系・未経験">

  <!-- 生成のきっかけになるボタン。押すと doGenerate() が動く -->
  <button id="genBtn">生成する</button>
  <!-- 出力（OUTPUT）を表示する場所。最初は空っぽ -->
  <div id="out"></div>

  <!-- 右下の自動テスト結果バッジ -->
  <div class="badge" id="badge">セルフテスト…</div>

<script>
/* =========================================================
   ② ロジック（JavaScript）：入力→生成→出力 の本体
   関数を「小さく・名前で役割が分かる」ように分けるのがコツ。
========================================================= */

// 入力欄の値を読むだけの小さな部品。id を渡すと中身の文字列を返す。
function val(id){
  var el = document.getElementById(id);   // HTMLから id で要素を取り出す
  return el ? el.value : "";               // 要素があれば値を、無ければ空文字を返す（安全策）
}

// XSS対策：ユーザーの入力に含まれる記号を“ただの文字”に変える。
// 例）<script> をそのまま画面に出すと危険なので無害化する。
function esc(s){
  return String(s).replace(/[<>&]/g, function(c){            // < > & を見つけて
    return {"<":"&lt;", ">":"&gt;", "&":"&amp;"}[c];          // 表示用の表記に置き換える
  });
}

// 入力をまとめて1つのオブジェクトにする（あとで使いやすい形に整える）。
function collectInput(){
  return {
    course: val("course").trim(),     // 前後の空白を取り除く
    audience: val("audience").trim()
  };
}

// 生成の本体：入力(inp)を受け取り、Markdown文字列を組み立てて返す。
// ※「画面に出す」ことはここではしない（作るだけ）。役割を分けるのが大事。
function generate(inp){
  var course = inp.course || "（コース名なし）";          // 未入力でも落ちないよう既定値
  var who = inp.audience ? inp.audience + "向け" : "受講者向け";
  var md = "";                                            // ここに文字列を足していく
  md += "# " + esc(course) + " 設計メモ\n\n";              // 見出し（# はMarkdownの見出し記号）
  md += "- 対象：" + esc(who) + "\n";                      // 箇条書き（- で始める）
  md += "- ゴール：自分の言葉で説明できる\n";
  md += "- 進め方：概要 → 説明 → 演習 → ふりかえり\n";
  return md;                                              // 完成したMarkdownを返す
}

// 出力：作った文字列を画面の #out に表示する（ここで初めて画面に触る）。
function render(md){
  document.getElementById("out").textContent = md;        // textContent なら自動で安全表示
}

// ボタンが押されたときの流れ：入力を集める→検証→生成→表示。
function doGenerate(){
  var inp = collectInput();                               // ①集める
  if(!inp.course){                                        // ②検証（必須チェック）
    alert("コース名を入れてね");                            // 未入力なら知らせて中断
    return;
  }
  render(generate(inp));                                  // ③生成して④表示
}

/* =========================================================
   ③ セルフテスト：起動時に「壊れていないか」を自分で確かめる
   人が毎回手で確認しなくて済む = 「人ではなく仕組み」。
========================================================= */
function runSelfTests(){
  var tests = [];                                         // テスト結果を貯める配列
  var T = function(name, fn){                             // テスト1件を実行する小さな道具
    try{ tests.push({name:name, ok: !!fn()}); }           // fn() が true なら合格
    catch(e){ tests.push({name:name, ok:false}); }        // 例外が出たら不合格
  };

  // 例1：必須が入っていれば見出しが作られる
  T("生成に見出しが入る", function(){
    return generate({course:"テスト"}).indexOf("# テスト") >= 0;
  });
  // 例2：対象を入れると「〜向け」になる
  T("対象が反映される", function(){
    return generate({course:"C", audience:"文系"}).indexOf("文系向け") >= 0;
  });
  // 例3：XSSエスケープが効く
  T("エスケープが効く", function(){
    return esc("<b>") === "&lt;b&gt;";
  });

  var ok = tests.filter(function(t){return t.ok;}).length; // 合格数を数える
  var total = tests.length;                                // 全体数
  var badge = document.getElementById("badge");
  badge.textContent = "セルフテスト " + ok + "/" + total + (ok===total ? " PASS" : " FAIL");
  window.__selftests = {ok:ok, total:total};               // テストから参照できるよう公開
}

/* =========================================================
   初期化：ページ準備ができたら、ボタンに処理をつなぎ、テストを走らせる
========================================================= */
function init(){
  document.getElementById("genBtn").addEventListener("click", doGenerate); // ボタン→処理を接続
  runSelfTests();                                                          // 起動時テスト
}
// HTMLの読み込みが終わってから init を呼ぶ（要素が無い状態で触らないため）
if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", init);
}else{
  init();
}
</script>
</body>
</html>
